<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Bot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f13; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
.header { background: #1a1a24; border-bottom: 1px solid #2a2a3a; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 1px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
.dot.off { background: #ef4444; animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #2a2a3a; color: #888; }
.badge.test { background: #1a2a1a; color: #22c55e; }

.toplam-bar { background: #12121a; border-bottom: 1px solid #2a2a3a; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
.toplam-bar .label { font-size: 12px; color: #666; }
.toplam-bar .value { font-size: 24px; font-weight: 700; color: #fff; }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #2a2a3a; border-bottom: 1px solid #2a2a3a; }
.stat { background: #1a1a24; padding: 14px 16px; }
.stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.stat-value { font-size: 18px; font-weight: 600; color: #fff; }
.stat-value.green { color: #22c55e; }
.stat-value.red { color: #ef4444; }
.stat-sub { font-size: 11px; color: #555; margin-top: 2px; }

.section { padding: 14px 16px; }
.section-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.section-title span { background: #2a2a3a; color: #888; font-size: 11px; padding: 2px 8px; border-radius: 20px; }

.pos-card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.pos-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.pos-title { font-size: 13px; color: #e0e0e0; line-height: 1.4; flex: 1; margin-right: 10px; }
.badge-yes { background: #0a2a0a; color: #22c55e; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px; border: 1px solid #22c55e33; white-space: nowrap; }
.badge-no  { background: #2a0a0a; color: #ef4444; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px; border: 1px solid #ef444433; white-space: nowrap; }
.pos-row { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 5px; }
.pos-row .val { color: #aaa; }
.pos-row .val.green { color: #22c55e; }
.pos-row .val.red { color: #ef4444; }
.trader-chip { display: inline-block; background: #252535; color: #888; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-right: 6px; }

.price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a2a3a; }
.price-box { text-align: center; flex: 1; }
.price-box .plabel { font-size: 10px; color: #555; margin-bottom: 3px; }
.price-box .pval { font-size: 15px; font-weight: 600; color: #fff; }
.price-box .pval.loading { color: #444; font-size: 12px; }
.price-arrow { color: #444; padding: 0 8px; font-size: 16px; }

.pnl-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
.pnl-label { font-size: 11px; color: #555; }
.pnl-val { font-size: 14px; font-weight: 600; }

.close-btn { width: 100%; margin-top: 10px; padding: 8px; background: #2a1a1a; border: 1px solid #ef444433; border-radius: 6px; color: #ef4444; font-size: 12px; font-weight: 500; cursor: pointer; }
.close-btn:hover { background: #3a1a1a; }
.close-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.empty { text-align: center; color: #444; padding: 40px 0; font-size: 14px; }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a24; border-top: 1px solid #2a2a3a; padding: 10px 16px; display: flex; gap: 8px; }
.btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-start   { background: #22c55e; color: #000; }
.btn-stop    { background: #ef4444; color: #fff; }
.btn-refresh { background: #2a2a3a; color: #aaa; flex: 0.4; }
.pb { padding-bottom: 80px; }
</style>
</head>
<body>

<div class="header">
  <h1><span class="dot" id="dot"></span>POLYMARKET BOT</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <span class="badge" id="modeBadge">YÜKLENIYOR</span>
    <span style="font-size:12px;color:#444;" id="scanInfo">#0</span>
  </div>
</div>

<div class="toplam-bar">
  <div class="label">Toplam Param</div>
  <div class="value" id="totalValue">$-.--</div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Nakit</div>
    <div class="stat-value" id="cash">$-.--</div>
  </div>
  <div class="stat">
    <div class="stat-label">Açık Poz.</div>
    <div class="stat-value" id="openValue">$-.--</div>
    <div class="stat-sub" id="openCount">0 pozisyon</div>
  </div>
  <div class="stat">
    <div class="stat-label">PnL</div>
    <div class="stat-value" id="pnl">$-.--</div>
    <div class="stat-sub" id="winRate">0%</div>
  </div>
</div>

<div class="section pb">
  <div class="section-title">
    Açık Pozisyonlar
    <span id="posCount">0</span>
  </div>
  <div id="positions"><div class="empty">Yükleniyor...</div></div>
</div>

<div class="bottom-bar">
  <button class="btn btn-refresh" onclick="load()">↻</button>
  <button class="btn btn-start" onclick="startBot()">▶ BAŞLAT</button>
  <button class="btn btn-stop" onclick="stopBot()">■ DURDUR</button>
</div>

<script>
const API = '';
let portfolio = null;
let currentPrices = {};

async function load() {
  try {
    const r = await fetch(API + '/api/status');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    portfolio = d.portfolio;
    renderStats(d);
    renderPositions(d.portfolio.open_positions || []);
    fetchPrices(d.portfolio.open_positions || []);
  } catch(e) {
    document.getElementById('positions').innerHTML = '<div class="empty">Bağlantı hatası: ' + e.message + '</div>';
  }
}

function renderStats(d) {
  const p = d.portfolio;
  document.getElementById('dot').className = 'dot' + (d.running ? '' : ' off');
  document.getElementById('modeBadge').textContent = d.test_mode ? 'TEST' : 'GERÇEK';
  document.getElementById('modeBadge').className = 'badge' + (d.test_mode ? ' test' : '');
  document.getElementById('scanInfo').textContent = '#' + d.scan_count;
  document.getElementById('totalValue').textContent = '$' + parseFloat(p.total_value).toFixed(2);
  document.getElementById('cash').textContent = '$' + parseFloat(p.cash).toFixed(2);
  document.getElementById('openValue').textContent = '$' + parseFloat(p.open_value).toFixed(2);
  document.getElementById('openCount').textContent = (p.open_positions || []).length + ' pozisyon';
  document.getElementById('posCount').textContent = (p.open_positions || []).length;
  const pnl = parseFloat(p.total_pnl || 0);
  const pnlEl = document.getElementById('pnl');
  pnlEl.textContent = (pnl >= 0 ? '+' : '') + '$' + Math.abs(pnl).toFixed(2);
  pnlEl.className = 'stat-value ' + (pnl >= 0 ? 'green' : 'red');
  document.getElementById('winRate').textContent = (p.win_rate || 0).toFixed(0) + '% (' + (p.winning_trades||0) + 'K/' + (p.losing_trades||0) + 'L)';
}

function renderPositions(positions) {
  if (positions.length === 0) {
    document.getElementById('positions').innerHTML = '<div class="empty">Açık pozisyon yok</div>';
    return;
  }
  let html = '';
  positions.forEach((pos, i) => {
    const curPrice = currentPrices[pos.token_id];
    const entry    = parseFloat(pos.entry_price);
    const size     = parseFloat(pos.size_usd);
    let pnlHtml = '';
    let curHtml = '<span class="pval loading">yükleniyor</span>';
    if (curPrice !== undefined) {
      curHtml = `<span class="pval">${curPrice.toFixed(3)}</span>`;
      const shares = size / entry;
      const pnl    = shares * (curPrice - entry);
      const pnlSign = pnl >= 0 ? '+' : '';
      const pnlCls  = pnl >= 0 ? 'green' : 'red';
      const pnlPct  = entry > 0 ? ((curPrice - entry) / entry * 100).toFixed(1) : '0';
      pnlHtml = `
        <div class="pnl-row">
          <span class="pnl-label">Tahmini K/Z</span>
          <span class="pnl-val ${pnlCls}">${pnlSign}$${Math.abs(pnl).toFixed(2)} (${pnlSign}${pnlPct}%)</span>
        </div>`;
    }
    html += `
      <div class="pos-card" id="card-${i}">
        <div class="pos-top">
          <div class="pos-title">${pos.market_title || 'Bilinmiyor'}</div>
          <span class="${pos.side === 'YES' ? 'badge-yes' : 'badge-no'}">${pos.side}</span>
        </div>
        <div class="pos-row">
          <span><span class="trader-chip">${pos.trader_name}</span>${pos.opened_at || ''}</span>
        </div>
        <div class="pos-row">
          <span>Boyut</span>
          <span class="val">$${size.toFixed(2)}</span>
        </div>
        <div class="price-row">
          <div class="price-box">
            <div class="plabel">Alış Fiyatı</div>
            <span class="pval">$${entry.toFixed(3)}</span>
          </div>
          <div class="price-arrow">→</div>
          <div class="price-box" id="cur-${i}">
            <div class="plabel">Güncel Fiyat</div>
            ${curHtml}
          </div>
        </div>
        ${pnlHtml}
        <button class="close-btn" onclick="closePosition('${pos.position_id}', ${i})" id="closebtn-${i}">
          ✕ Pozisyonu Kapat
        </button>
      </div>
    `;
  });
  document.getElementById('positions').innerHTML = html;
}

async function fetchPrices(positions) {
  for (let i = 0; i < positions.length; i++) {
    const pos = positions[i];
    if (!pos.token_id) continue;
    try {
      const r = await fetch(`https://clob.polymarket.com/last-trade-price?token_id=${pos.token_id}`);
      if (r.ok) {
        const d = await r.json();
        const price = parseFloat(d.price || pos.entry_price);
        currentPrices[pos.token_id] = price;
        // Güncel fiyat hücresini güncelle
        const curEl = document.getElementById('cur-' + i);
        if (curEl) {
          const entry  = parseFloat(pos.entry_price);
          const size   = parseFloat(pos.size_usd);
          const shares = size / entry;
          const pnl    = shares * (price - entry);
          const pnlSign = pnl >= 0 ? '+' : '';
          const pnlCls  = pnl >= 0 ? 'green' : 'red';
          const pnlPct  = entry > 0 ? ((price - entry) / entry * 100).toFixed(1) : '0';
          curEl.innerHTML = `<div class="plabel">Güncel Fiyat</div><span class="pval">$${price.toFixed(3)}</span>`;
          // pnl satırını bul ve güncelle
          const card = document.getElementById('card-' + i);
          if (card) {
            let pnlRow = card.querySelector('.pnl-row');
            if (!pnlRow) {
              pnlRow = document.createElement('div');
              pnlRow.className = 'pnl-row';
              const closeBtn = card.querySelector('.close-btn');
              card.insertBefore(pnlRow, closeBtn);
            }
            pnlRow.innerHTML = `<span class="pnl-label">Tahmini K/Z</span><span class="pnl-val ${pnlCls}">${pnlSign}$${Math.abs(pnl).toFixed(2)} (${pnlSign}${pnlPct}%)</span>`;
          }
        }
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 200));
  }
}

async function closePosition(posId, idx) {
  const btn = document.getElementById('closebtn-' + idx);
  if (btn) { btn.disabled = true; btn.textContent = 'Kapatılıyor...'; }
  try {
    const r = await fetch(API + '/api/close-position', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({position_id: posId})
    });
    const d = await r.json();
    if (d.ok) {
      const card = document.getElementById('card-' + idx);
      if (card) card.style.opacity = '0.3';
      setTimeout(load, 1000);
    } else {
      if (btn) { btn.disabled = false; btn.textContent = '✕ Pozisyonu Kapat'; }
      alert(d.msg || 'Hata oluştu');
    }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '✕ Pozisyonu Kapat'; }
    alert('Bağlantı hatası');
  }
}

async function startBot() {
  await fetch(API + '/api/start', {method:'POST'});
  setTimeout(load, 1000);
}

async function stopBot() {
  await fetch(API + '/api/stop', {method:'POST'});
  setTimeout(load, 1000);
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
